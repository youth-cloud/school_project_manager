server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:20MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:50MB}

app:
  upload:
    access-url-prefix: ${APP_UPLOAD_ACCESS_URL_PREFIX:/uploads/}
    max-file-size: ${APP_UPLOAD_MAX_FILE_SIZE:10485760}
    allowed-extensions: ${APP_UPLOAD_ALLOWED_EXTENSIONS:pdf,doc,docx,xls,xlsx,ppt,pptx,zip,rar,7z,txt,md,png,jpg,jpeg,webp}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: org.example.backend.**.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

jwt:
  secret: ${JWT_SECRET:change-this-to-a-very-long-random-secret-key}
  expiration: ${JWT_EXPIRATION:86400000}
